<svg viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="500" fill="#ffffff"/>

  <!-- Bowl outer -->
  <ellipse cx="300" cy="285" rx="220" ry="70" fill="#ffffff" stroke="#000000" stroke-width="3"/>
  <path d="M80,285 Q300,440 520,285" fill="#ffffff" stroke="#000000" stroke-width="3"/>

  <!-- Green curry broth -->
  <ellipse cx="300" cy="285" rx="190" ry="55" fill="#c8e6a0" stroke="#000000" stroke-width="2"/>

  <!-- Red chili slices (rings) -->
  <g stroke="#000000" stroke-width="1.5" fill="#d44">
    <circle cx="220" cy="280" r="6"/>
    <circle cx="220" cy="280" r="2.5" fill="#fff"/>
    <circle cx="370" cy="295" r="6"/>
    <circle cx="370" cy="295" r="2.5" fill="#fff"/>
    <circle cx="290" cy="270" r="5"/>
    <circle cx="290" cy="270" r="2" fill="#fff"/>
  </g>

  <!-- Bamboo shoot strips -->
  <g fill="#f5e6a8" stroke="#000000" stroke-width="2">
    <rect x="245" y="295" width="22" height="6" transform="rotate(-15 256 298)"/>
    <rect x="320" y="305" width="22" height="6" transform="rotate(20 331 308)"/>
    <rect x="395" y="278" width="22" height="6" transform="rotate(10 406 281)"/>
  </g>

  <!-- Eggplant pieces (purple-green) -->
  <g stroke="#000000" stroke-width="2">
    <circle cx="200" cy="300" r="9" fill="#9a7a3a"/>
    <circle cx="350" cy="278" r="9" fill="#9a7a3a"/>
    <circle cx="420" cy="298" r="9" fill="#9a7a3a"/>
  </g>

  <!-- Thai basil leaves (pointed green) -->
  <g fill="#3a8a3a" stroke="#000000" stroke-width="2">
    <path d="M260,255 Q275,240 285,260 Q272,272 260,255 Z"/>
    <path d="M315,250 Q330,235 340,255 Q325,267 315,250 Z"/>
    <path d="M380,255 Q395,240 405,260 Q392,272 380,255 Z"/>
  </g>

  <!-- Coconut milk swirl -->
  <g fill="none" stroke="#ffffff" stroke-width="4">
    <path d="M180,290 Q230,275 280,295 Q330,310 380,290 Q420,278 440,295"/>
  </g>
  <g fill="none" stroke="#000000" stroke-width="1.5">
    <path d="M180,290 Q230,275 280,295 Q330,310 380,290 Q420,278 440,295"/>
  </g>

  <!-- Steam -->
  <g fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round">
    <path d="M260,215 q-10,-15 0,-30 q10,-15 0,-30"/>
    <path d="M340,215 q-10,-15 0,-30 q10,-15 0,-30"/>
  </g>

  <text x="300" y="445" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="28" fill="#000000">thai green curry</text>
</svg>
