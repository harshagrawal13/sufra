<svg viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="500" fill="#ffffff"/>

  <!-- Bowl outer -->
  <ellipse cx="300" cy="285" rx="220" ry="70" fill="#ffffff" stroke="#000000" stroke-width="3"/>
  <path d="M80,285 Q300,440 520,285" fill="#ffffff" stroke="#000000" stroke-width="3"/>

  <!-- Orange masala gravy -->
  <ellipse cx="300" cy="285" rx="190" ry="55" fill="#e87a3a" stroke="#000000" stroke-width="2"/>

  <!-- Paneer cubes (white squares, slightly tilted) -->
  <g stroke="#000000" stroke-width="2" fill="#fff8e8">
    <rect x="195" y="270" width="28" height="22" transform="rotate(-8 209 281)"/>
    <rect x="240" y="295" width="28" height="22" transform="rotate(12 254 306)"/>
    <rect x="290" y="265" width="28" height="22" transform="rotate(-15 304 276)"/>
    <rect x="335" y="300" width="28" height="22" transform="rotate(8 349 311)"/>
    <rect x="385" y="275" width="28" height="22" transform="rotate(-10 399 286)"/>
    <rect x="245" y="265" width="22" height="18" transform="rotate(20 256 274)"/>
    <rect x="375" y="305" width="22" height="18" transform="rotate(-5 386 314)"/>
  </g>

  <!-- Cream swirl on top -->
  <g fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round">
    <path d="M200,300 Q250,285 290,305 Q340,322 390,300 Q420,288 430,295"/>
  </g>
  <g fill="none" stroke="#000000" stroke-width="1.5" stroke-linecap="round">
    <path d="M200,300 Q250,285 290,305 Q340,322 390,300 Q420,288 430,295"/>
  </g>

  <!-- Coriander leaves -->
  <g fill="#3a8a3a" stroke="#000000" stroke-width="1.5">
    <path d="M225,260 Q232,253 240,260 Q232,266 225,260 Z"/>
    <path d="M310,295 Q318,288 326,295 Q318,302 310,295 Z"/>
    <path d="M370,265 Q378,258 386,265 Q378,272 370,265 Z"/>
    <path d="M270,285 Q277,279 284,285 Q277,290 270,285 Z"/>
  </g>

  <!-- Kasuri methi / spice flecks -->
  <g fill="#7a3a1a">
    <circle cx="215" cy="295" r="1.5"/>
    <circle cx="265" cy="278" r="1.5"/>
    <circle cx="320" cy="290" r="1.5"/>
    <circle cx="360" cy="298" r="1.5"/>
    <circle cx="410" cy="295" r="1.5"/>
    <circle cx="295" cy="312" r="1.5"/>
    <circle cx="345" cy="275" r="1.5"/>
  </g>

  <!-- Steam -->
  <g fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round">
    <path d="M260,215 q-10,-15 0,-30 q10,-15 0,-30"/>
    <path d="M340,215 q-10,-15 0,-30 q10,-15 0,-30"/>
  </g>

  <text x="300" y="445" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="28" fill="#000000">paneer butter masala</text>
</svg>
