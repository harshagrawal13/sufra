<svg viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg">

  <!-- Plate -->
  <ellipse cx="300" cy="295" rx="240" ry="80" fill="#ffffff" stroke="#000000" stroke-width="3"/>
  <ellipse cx="300" cy="290" rx="190" ry="55" fill="#ffffff" stroke="#000000" stroke-width="3"/>

  <!-- Cream sauce blob -->
  <ellipse cx="300" cy="295" rx="170" ry="42" fill="#fff5d8" stroke="#000000" stroke-width="2"/>

  <!-- Fettuccine: thick flat noodles (yellow ribbons) -->
  <g fill="none" stroke="#f4d65a" stroke-width="9" stroke-linecap="round">
    <path d="M170,290 C220,265 280,315 340,280 C390,255 430,305 450,290"/>
    <path d="M165,300 C215,280 270,260 330,295 C380,325 430,280 450,300"/>
    <path d="M175,275 C230,300 290,265 350,300 C400,325 440,290 445,278"/>
    <path d="M160,290 C210,315 270,280 320,310 C370,335 420,300 450,295"/>
    <path d="M180,305 C240,280 290,315 340,285 C400,255 430,315 445,305"/>
  </g>
  <!-- Black outlines -->
  <g fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round">
    <path d="M170,290 C220,265 280,315 340,280 C390,255 430,305 450,290"/>
    <path d="M165,300 C215,280 270,260 330,295 C380,325 430,280 450,300"/>
    <path d="M175,275 C230,300 290,265 350,300 C400,325 440,290 445,278"/>
    <path d="M160,290 C210,315 270,280 320,310 C370,335 420,300 450,295"/>
    <path d="M180,305 C240,280 290,315 340,285 C400,255 430,315 445,305"/>
  </g>

  <!-- Cream blobs on top -->
  <g fill="#ffffff" stroke="#000000" stroke-width="2">
    <ellipse cx="240" cy="285" rx="14" ry="6"/>
    <ellipse cx="320" cy="280" rx="14" ry="6"/>
    <ellipse cx="395" cy="295" rx="14" ry="6"/>
  </g>

  <!-- Parsley flakes -->
  <g fill="#3a8a3a" stroke="#000000" stroke-width="1">
    <circle cx="225" cy="295" r="3"/>
    <circle cx="280" cy="278" r="3"/>
    <circle cx="335" cy="305" r="3"/>
    <circle cx="380" cy="280" r="3"/>
    <circle cx="420" cy="298" r="3"/>
    <circle cx="260" cy="312" r="3"/>
    <circle cx="355" cy="285" r="3"/>
  </g>

  <!-- Black pepper -->
  <g fill="#000000">
    <circle cx="245" cy="298" r="1.5"/>
    <circle cx="305" cy="290" r="1.5"/>
    <circle cx="370" cy="305" r="1.5"/>
    <circle cx="405" cy="282" r="1.5"/>
  </g>

  <!-- Steam -->
  <g fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round">
    <path d="M270,225 q-10,-15 0,-30 q10,-15 0,-30"/>
    <path d="M335,225 q-10,-15 0,-30 q10,-15 0,-30"/>
  </g>

  <text x="300" y="440" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="28" fill="#000000">fettuccine alfredo</text>
</svg>
