<svg viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg">

  <!-- Bowl outer -->
  <ellipse cx="300" cy="300" rx="220" ry="70" fill="#ffffff" stroke="#000000" stroke-width="3"/>
  <path d="M80,300 Q300,440 520,300" fill="#ffffff" stroke="#000000" stroke-width="3"/>

  <!-- Risotto blob (creamy) -->
  <ellipse cx="300" cy="295" rx="180" ry="48" fill="#f5e6c0" stroke="#000000" stroke-width="2"/>

  <!-- Rice grains -->
  <g fill="#ffffff" stroke="#000000" stroke-width="1">
    <ellipse cx="180" cy="290" rx="5" ry="2"/>
    <ellipse cx="210" cy="305" rx="5" ry="2" transform="rotate(20 210 305)"/>
    <ellipse cx="240" cy="285" rx="5" ry="2" transform="rotate(-15 240 285)"/>
    <ellipse cx="265" cy="310" rx="5" ry="2" transform="rotate(35 265 310)"/>
    <ellipse cx="295" cy="280" rx="5" ry="2"/>
    <ellipse cx="325" cy="305" rx="5" ry="2" transform="rotate(-25 325 305)"/>
    <ellipse cx="355" cy="290" rx="5" ry="2" transform="rotate(15 355 290)"/>
    <ellipse cx="385" cy="310" rx="5" ry="2"/>
    <ellipse cx="410" cy="285" rx="5" ry="2" transform="rotate(40 410 285)"/>
    <ellipse cx="195" cy="320" rx="5" ry="2" transform="rotate(-10 195 320)"/>
    <ellipse cx="280" cy="320" rx="5" ry="2" transform="rotate(20 280 320)"/>
    <ellipse cx="370" cy="320" rx="5" ry="2" transform="rotate(-30 370 320)"/>
    <ellipse cx="225" cy="278" rx="5" ry="2"/>
    <ellipse cx="340" cy="278" rx="5" ry="2" transform="rotate(25 340 278)"/>
  </g>

  <!-- Mushroom slices (brown oval caps with stem notch) -->
  <g stroke="#000000" stroke-width="2">
    <g fill="#a07050">
      <ellipse cx="220" cy="295" rx="22" ry="10"/>
      <rect x="213" y="293" width="14" height="6" fill="#d6b48a"/>
    </g>
    <g fill="#a07050">
      <ellipse cx="320" cy="285" rx="20" ry="9" transform="rotate(-15 320 285)"/>
      <rect x="313" y="283" width="14" height="5" fill="#d6b48a" transform="rotate(-15 320 285)"/>
    </g>
    <g fill="#a07050">
      <ellipse cx="395" cy="305" rx="22" ry="10" transform="rotate(20 395 305)"/>
      <rect x="388" y="303" width="14" height="6" fill="#d6b48a" transform="rotate(20 395 305)"/>
    </g>
  </g>

  <!-- Spinach leaves -->
  <g fill="#3a8a3a" stroke="#000000" stroke-width="2">
    <path d="M170,275 Q180,255 200,265 Q190,285 170,275 Z"/>
    <path d="M275,260 Q295,245 305,265 Q290,280 275,260 Z"/>
    <path d="M360,265 Q380,250 390,270 Q375,285 360,265 Z"/>
    <path d="M430,290 Q445,275 455,295 Q440,308 430,290 Z"/>
    <path d="M250,315 Q270,305 280,322 Q263,330 250,315 Z"/>
  </g>

  <!-- Steam -->
  <g fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round">
    <path d="M260,225 q-10,-15 0,-30 q10,-15 0,-30"/>
    <path d="M340,225 q-10,-15 0,-30 q10,-15 0,-30"/>
  </g>

  <text x="300" y="445" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="26" fill="#000000">mushroom &amp; spinach risotto</text>
</svg>
